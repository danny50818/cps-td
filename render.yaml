services:
  - type: web
    name: frontline-guardian
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: LEADERBOARD_GAME_ID
        value: frontline-guardian-v4
      - key: DATABASE_URL
        fromDatabase:
          name: frontline-guardian-db
          property: connectionString

databases:
  - name: frontline-guardian-db
    plan: free
    region: singapore
    databaseName: frontline_guardian
    user: frontline_guardian
